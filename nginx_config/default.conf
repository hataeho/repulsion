# ---------------------------------------------------------
# 안티그래비티 중앙 Nginx 역방향 프록시 (Reverse Proxy) 설정 파일
# 망가져도 복구 스크립트로 즉시 환생할 ト래픽 경찰관입니다.
# ---------------------------------------------------------

# 1. 인공지능 연구 도메인 (bigmap.ai) 라우팅
server {
    listen 80;
    server_name bigmap.ai www.bigmap.ai;

    location / {
        # docker-compose.yml의 서비스명 'bigmap-app'으로 트래픽을 던짐 (FastAPI/Flask 기본포트 8000 가정)
        proxy_pass http://bigmap-app:8000; 
        
        # 외부 클라이언트의 원래 정보(IP 등)를 보존하여 백엔드에 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# 2. 투약/약품 관리 도메인 (petpharm.ai) 라우팅
server {
    listen 80;
    server_name petpharm.ai www.petpharm.ai;

    location / {
        # 노드JS/React 기반(포트 3000 가정) 컨테이너 'petpharm-app'으로 포워딩
        proxy_pass http://petpharm-app:3000; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# 3. 육계농장 코어 관리 도메인 (broiler.kr) 라우팅
server {
    listen 80;
    server_name broiler.kr www.broiler.kr;

    location / {
        # 노드JS/React 프론트 'broiler-app'으로 포워딩
        proxy_pass http://broiler-app:3000; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
