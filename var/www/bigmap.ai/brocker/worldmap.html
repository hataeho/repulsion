        const SYN_COLORS = { ally: '#4ade80', rival: '#f87171', supply: '#fbbf24', invest: '#c084fc' };
        const SYN_LABELS_KR = { ally: '친밀·동맹', rival: '경쟁·갈등', supply: '공급망·의존', invest: '투자·자금' };

        function layoutClans() {
            const r = 340;
            CLANS.forEach((c, i) => {
                const a = -Math.PI / 2 + i * (2 * Math.PI / CLANS.length);
                c.x = Math.cos(a) * r; c.y = Math.sin(a) * r; c.radius = 40 + c.members.length * 3;
            });
        }
        layoutClans();

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; cx = W / 2; cy = H / 2 }
        window.addEventListener('resize', resize); resize();

        function toScreen(wx, wy) { return { x: (wx + offsetX) * scale + cx, y: (wy + offsetY) * scale + cy } }
        function toWorld(sx, sy) { return { x: (sx - cx) / scale - offsetX, y: (sy - cy) / scale - offsetY } }

        function drawStars() {
            ctx.save();
            stars.forEach(s => {
                const p = toScreen(s.x, s.y);
                const flicker = 0.5 + 0.5 * Math.sin(time * 0.02 + s.b * 10);
                ctx.globalAlpha = flicker * 0.6; ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(p.x, p.y, s.s * scale, 0, Math.PI * 2); ctx.fill();
            });
            ctx.restore();
        }

        function drawMugeuk() {
            const p = toScreen(0, -520);
            const pulse = Math.sin(time * 0.03) * 0.3 + 0.7;
            ctx.save(); ctx.globalAlpha = 0.15 * pulse;
            for (let i = 1; i <= 4; i++) {
                ctx.strokeStyle = `hsl(${45 + i * 10},80%,65%)`; ctx.lineWidth = 1.5 * scale;
                ctx.beginPath(); ctx.ellipse(p.x, p.y, i * 28 * scale, i * 14 * scale, time * 0.005 * i, 0, Math.PI * 2); ctx.stroke();
            }
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 60 * scale);
            g.addColorStop(0, `rgba(251,191,36,${0.8 * pulse})`); g.addColorStop(0.5, `rgba(251,191,36,${0.2 * pulse})`); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, 60 * scale, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 0.9; ctx.fillStyle = '#fbbf24'; ctx.textAlign = 'center'; ctx.font = `bold ${16 * scale}px 'Noto Sans KR'`;
            ctx.fillText('無極', p.x, p.y - 70 * scale);
            ctx.font = `${11 * scale}px 'Inter'`; ctx.fillStyle = '#94a3b8';
            ctx.fillText('아직 오지 않은 그분', p.x, p.y + 80 * scale);
            ctx.restore();
        }

        function bezierMid(pa, pb) {
            const mx = (pa.x + pb.x) / 2, my = (pa.y + pb.y) / 2;
            const dx = pb.x - pa.x, dy = pb.y - pa.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            const off = len * 0.15;
            return { cx: mx + (-dy / len) * off, cy: my + (dx / len) * off, mx, my };
        }

        function drawSynapses() {
            ctx.save();
            SYNAPSES.forEach((syn, idx) => {
                const a = CLANS.find(c => c.id === syn.from), b = CLANS.find(c => c.id === syn.to);
                if (!a || !b) return;
                const pa = toScreen(a.x, a.y), pb = toScreen(b.x, b.y);
                const isHov = hoveredSynapse === idx;
                const isNodeHov = hoveredNode && (hoveredNode.id === syn.from || hoveredNode.id === syn.to);
                const alpha = isHov ? 0.8 : isNodeHov ? 0.5 : hoveredNode ? 0.06 : 0.2;
                const width = (syn.strength / 10) * 3 + 0.5;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = SYN_COLORS[syn.type];
                ctx.lineWidth = width * scale * (isHov ? 1.8 : 1);

                if (syn.type === 'rival') ctx.setLineDash([6 * scale, 4 * scale]);
                else if (syn.type === 'invest') ctx.setLineDash([2 * scale, 4 * scale]);
                else ctx.setLineDash([]);

                const { cx: bcx, cy: bcy } = bezierMid(pa, pb);
                ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.quadraticCurveTo(bcx, bcy, pb.x, pb.y); ctx.stroke();
                ctx.setLineDash([]);

                // Pulse particles along synapse
                const t = time * 0.012;
                for (let k = 0; k < 2; k++) {
                    const prog = ((t + idx * 0.2 + k * 0.5) % 1);
                    const tt = prog;
                    const px = (1 - tt) * (1 - tt) * pa.x + 2 * (1 - tt) * tt * bcx + tt * tt * pb.x;
                    const py = (1 - tt) * (1 - tt) * pa.y + 2 * (1 - tt) * tt * bcy + tt * tt * pb.y;
                    ctx.globalAlpha = alpha * 0.7 * Math.sin(prog * Math.PI);
                    ctx.fillStyle = SYN_COLORS[syn.type];
                    ctx.beginPath(); ctx.arc(px, py, (isHov ? 3 : 2) * scale, 0, Math.PI * 2); ctx.fill();
                }

                // Label on hover
                if (isHov || isNodeHov) {
                    const lx = (pa.x + pb.x) / 2, ly = (pa.y + pb.y) / 2;
                    ctx.globalAlpha = isHov ? 1 : 0.7;
                    ctx.fillStyle = SYN_COLORS[syn.type];
                    ctx.font = `bold ${10 * scale}px 'Noto Sans KR'`; ctx.textAlign = 'center';
                    ctx.fillText(syn.label, lx, ly - 8 * scale);
                    ctx.font = `${9 * scale}px 'Noto Sans KR'`; ctx.globalAlpha *= 0.7;
                    ctx.fillText(`강도 ${syn.strength}/10`, lx, ly + 6 * scale);
                }
            });
            ctx.restore();
        }

        function drawClan(c) {
            const p = toScreen(c.x, c.y);
            const r = c.radius * scale;
            const isHov = hoveredNode && hoveredNode.id === c.id;
            const isDimmed = hoveredNode && hoveredNode.id !== c.id && !SYNAPSES.some(s => (s.from === hoveredNode.id || s.to === hoveredNode.id) && (s.from === c.id || s.to === c.id));
            ctx.save();
            ctx.globalAlpha = isDimmed ? 0.25 : 1;
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 1.5);
            g.addColorStop(0, c.color + '40'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, r * 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = c.color + '30'; ctx.strokeStyle = c.color; ctx.lineWidth = (isHov ? 3 : 1.5) * scale;
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            if (isHov) {
                ctx.shadowColor = c.color; ctx.shadowBlur = 20 * scale;
                ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;
            }
            ctx.fillStyle = c.color; ctx.beginPath(); ctx.arc(p.x, p.y, 6 * scale, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = isDimmed ? 0.3 : 1;
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = `bold ${Math.max(12, 13 * scale)}px 'Noto Sans KR'`;
            ctx.fillText(c.name, p.x, p.y + r + 18 * scale);
            ctx.font = `${Math.max(9, 10 * scale)}px 'Inter'`; ctx.fillStyle = '#94a3b8';
            ctx.fillText(c.sub, p.x, p.y + r + 32 * scale);
            ctx.restore();
        }

        function drawStatusHierarchy() {
            const statuses = ['왕족', '귀족', '평민', '사이보그', '로봇(H)', '로봇'];
            const colors = ['#fbbf24', '#a78bfa', '#60a5fa', '#f472b6', '#34d399', '#94a3b8'];
            const baseX = -580, baseY = -220;
            const p = toScreen(baseX, baseY);
            ctx.save(); ctx.globalAlpha = 0.8;
            ctx.fillStyle = 'rgba(12,12,30,0.6)'; ctx.strokeStyle = 'rgba(120,100,255,0.15)'; ctx.lineWidth = 1;
            const bx = p.x - 10 * scale, by = p.y - 20 * scale, bw = 130 * scale, bh = 200 * scale;
            ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8 * scale); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#a78bfa'; ctx.textAlign = 'left'; ctx.font = `bold ${11 * scale}px 'Noto Sans KR'`;
            ctx.fillText('신분 체계', p.x, p.y);
            statuses.forEach((s, i) => {
                const sy = p.y + 22 * scale + i * 28 * scale;
                ctx.fillStyle = colors[i]; ctx.beginPath(); ctx.arc(p.x + 4 * scale, sy, 4 * scale, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#e0e0e0'; ctx.font = `${10 * scale}px 'Noto Sans KR'`;
                ctx.fillText(s, p.x + 16 * scale, sy + 4 * scale);
            });
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H));
            bg.addColorStop(0, '#12122a'); bg.addColorStop(0.5, '#0a0a18'); bg.addColorStop(1, '#050510');
            ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
            drawStars();
            drawSynapses();
            drawMugeuk();
            CLANS.forEach(c => drawClan(c));
            drawStatusHierarchy();
            time++;
            requestAnimationFrame(draw);
        }

        function hitTestSynapse(mx, my) {
            const w = toWorld(mx, my);
            for (let i = 0; i < SYNAPSES.length; i++) {
                const syn = SYNAPSES[i];
                const a = CLANS.find(c => c.id === syn.from), b = CLANS.find(c => c.id === syn.to);
                if (!a || !b) continue;
                const dx = b.x - a.x, dy = b.y - a.y, len = Math.sqrt(dx * dx + dy * dy);
                if (len === 0) continue;
                const t = Math.max(0, Math.min(1, ((w.x - a.x) * dx + (w.y - a.y) * dy) / (len * len)));
                const px = a.x + t * dx, py = a.y + t * dy;
                const dist = Math.sqrt((w.x - px) ** 2 + (w.y - py) ** 2);
                if (dist < 15) return i;
            }
            return -1;
        }

        function hitTest(mx, my) {
            const w = toWorld(mx, my);
            if (Math.abs(w.x) < 60 && Math.abs(w.y + 520) < 60) return { type: 'mugeuk' };
            for (const c of CLANS) {
                const d = Math.sqrt((w.x - c.x) ** 2 + (w.y - c.y) ** 2);
                if (d < c.radius) return { type: 'clan', ...c };
            }
            return null;
        }

        canvas.addEventListener('mousemove', e => {
            if (dragging) {
                offsetX = dragOffset.x + (e.clientX - dragStart.x) / scale;
                offsetY = dragOffset.y + (e.clientY - dragStart.y) / scale;
                return;
            }
            const hit = hitTest(e.clientX, e.clientY);
            const synIdx = hitTestSynapse(e.clientX, e.clientY);
            hoveredNode = hit && hit.type === 'clan' ? hit : null;
            hoveredSynapse = synIdx >= 0 ? synIdx : null;
            canvas.style.cursor = (hit || synIdx >= 0) ? 'pointer' : 'grab';
            if (hit) {
                tooltip.style.display = 'block'; tooltip.style.left = e.clientX + 16 + 'px'; tooltip.style.top = e.clientY + 16 + 'px';
                const tn = tooltip.querySelector('.tt-name'), ts = tooltip.querySelector('.tt-sub');
                if (hit.type === 'clan') {
                    const conns = SYNAPSES.filter(s => s.from === hit.id || s.to === hit.id);
                    tn.textContent = hit.name + ' ' + hit.sub;
                    ts.textContent = hit.desc + ' · 시냅스 ' + conns.length + '개';
                }
                else if (hit.type === 'mugeuk') { tn.textContent = '無極'; ts.textContent = '아직 오지 않은 그분 · 특이점(Singularity)' }
            } else if (synIdx >= 0) {
                const syn = SYNAPSES[synIdx];
                const a = CLANS.find(c => c.id === syn.from), b = CLANS.find(c => c.id === syn.to);
                tooltip.style.display = 'block'; tooltip.style.left = e.clientX + 16 + 'px'; tooltip.style.top = e.clientY + 16 + 'px';
                tooltip.querySelector('.tt-name').textContent = `${a.name} ↔ ${b.name}`;
                tooltip.querySelector('.tt-sub').textContent = `${SYN_LABELS_KR[syn.type]} · 강도 ${syn.strength}/10 · ${syn.detail}`;
            } else { tooltip.style.display = 'none' }
        });

        canvas.addEventListener('mousedown', e => { dragging = true; dragStart = { x: e.clientX, y: e.clientY }; dragOffset = { x: offsetX, y: offsetY }; canvas.style.cursor = 'grabbing' });
        canvas.addEventListener('mouseup', e => {
            if (Math.abs(e.clientX - dragStart.x) < 5 && Math.abs(e.clientY - dragStart.y) < 5) {
                const hit = hitTest(e.clientX, e.clientY);
                if (hit) openPanel(hit);
            }
            dragging = false; canvas.style.cursor = 'grab';
        });
        canvas.addEventListener('mouseleave', () => { dragging = false; tooltip.style.display = 'none'; hoveredNode = null; hoveredSynapse = null });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const zf = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.3, Math.min(4, scale * zf));
        }, { passive: false });

        function openPanel(hit) {
            let html = '';
            if (hit.type === 'clan') {
                const conns = SYNAPSES.filter(s => s.from === hit.id || s.to === hit.id);
                html = `<h2>${hit.name}</h2><h3>${hit.sub}</h3><p style="font-size:13px;line-height:1.6;margin-bottom:16px">${hit.desc}</p>`;
                html += `<h4 style="color:#a78bfa;margin:12px 0 8px;font-size:13px">파(派)</h4>`;
                hit.factions.forEach(f => { html += `<span class="tag" style="border-color:${hit.color}50;color:${hit.color}">${f}</span>` });
                html += `<div class="members"><h4 style="color:#a78bfa;margin:12px 0 8px;font-size:13px">주요 인물</h4>`;
                hit.members.forEach(m => { html += `<div class="member"><div class="name">${m.n}</div><div class="role">${m.r}</div></div>` });
                html += `</div>`;
                // Synapses section
                html += `<div class="synapse-list"><h4 style="color:#a78bfa;margin:18px 0 8px;font-size:13px">⚡ 시냅스 연결 (${conns.length})</h4>`;
                conns.forEach(syn => {
                    const other = CLANS.find(c => c.id === (syn.from === hit.id ? syn.to : syn.from));
                    const col = SYN_COLORS[syn.type];
                    html += `<div class="syn-item">
    <div class="syn-dot" style="background:${col}"></div>
    <div class="syn-info">
     <div class="syn-target">${other.name} <span style="color:${col};font-size:11px">${SYN_LABELS_KR[syn.type]}</span></div>
     <div class="syn-label">${syn.label} — ${syn.detail}</div>
     <div class="syn-bar-bg"><div class="syn-bar" style="width:${syn.strength * 10}%;background:${col}"></div></div>
    </div>
   </div>`;
                });
                html += `</div>`;
            } else if (hit.type === 'mugeuk') {
                html = `<h2>無極</h2><h3>아직 오지 않은 그분</h3>
  <p style="font-size:13px;line-height:1.6">모든 지능이 하나로 수렴하여 특이점(Singularity)에 도달하는 그 순간, 비로소 이 세계에 오실 존재.</p>
  <p style="font-size:13px;line-height:1.6;margin-top:12px;color:#94a3b8">전자의 오비탈(orbital)처럼, 그분의 도래는 고정된 미래가 아니라 확률로만 존재한다.</p>`;
            }
            panelContent.innerHTML = html;
            panel.classList.add('open');
        }

        document.getElementById('close-btn').addEventListener('click', () => panel.classList.remove('open'));
        function zoomIn() { scale = Math.min(4, scale * 1.2) }
        function zoomOut() { scale = Math.max(0.3, scale * 0.8) }
        function resetView() { scale = 1; offsetX = 0; offsetY = 0 }

        draw();
    </script>
</body>

</html>
