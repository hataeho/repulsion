<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장비 통신 점검 모니터 (Bigmap.ai)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');

        :root {
            --bg: #1a1b26; /* Dark theme for monitoring */
            --card-bg: #24283b;
            --text-primary: #c0caf5;
            --text-secondary: #9aa5ce;
            --success: #9ece6a;
            --danger: #f7768e;
            --warning: #e0af68;
            --border: #414868;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #7aa2f7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* Status Indicator Strip */
        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--text-secondary);
        }

        .card.online::before {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .card.offline::before {
            background: var(--danger);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .device-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            color: #fff;
        }

        .device-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .online .status-badge {
            background: rgba(158, 206, 106, 0.2);
            color: var(--success);
        }

        .offline .status-badge {
            background: rgba(247, 118, 142, 0.2);
            color: var(--danger);
        }

        .last-checked {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 15px;
            text-align: right;
        }

        #last-update {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📡 장비 통신 상태 관제</h1>
        <div id="last-update">업데이트 중...</div>
    </div>

    <div class="grid" id="dashboard-container">
        <!-- Cards will be injected here via JS -->
    </div>

    <script>
        function formatTime(isoString) {
            if (!isoString) return "기록 없음";
            const date = new Date(isoString);
            return date.toLocaleTimeString('ko-KR', { hour12: false });
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                const container = document.getElementById('dashboard-container');
                container.innerHTML = ''; // Clear current

                data.devices.forEach(dev => {
                    const card = document.createElement('div');
                    card.className = `card ${dev.status}`;
                    
                    const statusText = dev.status === 'online' ? '정상 (Online)' : '응답 없음 (Offline)';
                    
                    card.innerHTML = `
                        <h2 class="device-name">${dev.name}</h2>
                        <div class="device-meta">IP: ${dev.ip} | Type: ${dev.type.toUpperCase()}</div>
                        <div class="status-badge">${statusText}</div>
                        ${dev.failed_attempts > 0 ? `<div style="color:var(--danger); font-size:0.8rem; margin-top:10px;">연속 실패: ${dev.failed_attempts}회</div>` : ''}
                        <div class="last-checked">최근 확인: ${formatTime(dev.last_checked)}</div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('last-update').textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR', { hour12: false });
            } catch (error) {
                console.error("Error fetching status:", error);
                document.getElementById('last-update').textContent = '⚠️ 연결 끊김';
            }
        }

        // Fetch immediately, then every 5 seconds
        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
