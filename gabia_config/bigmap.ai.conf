server {
    server_name bigmap.ai www.bigmap.ai;
    root /var/www/bigmap.ai;
    index index.html index.htm;
    location /api/simworld/ { proxy_pass http://127.0.0.1:3456/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/ { proxy_pass http://127.0.0.1:3333; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /agent/ { proxy_pass http://127.0.0.1:3000/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_buffering off; proxy_read_timeout 120s; }
    location /gopher/api/ {
        auth_basic "Gopher Access";
        auth_basic_user_file /etc/nginx/.gopher_htpasswd;
        proxy_pass http://127.0.0.1:3700/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50M;
    }
    location /gopher/ {
        auth_basic "Gopher Access";
        auth_basic_user_file /etc/nginx/.gopher_htpasswd;
        alias /var/www/bigmap.ai/gopher/;
        try_files $uri $uri/ =404;
    }
    location / { try_files $uri $uri/ =404; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bigmap.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bigmap.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.bigmap.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = bigmap.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name bigmap.ai www.bigmap.ai;
    return 404; # managed by Certbot




}